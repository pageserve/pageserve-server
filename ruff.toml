# Ruff configuration for pageserve-server.
# Target the Docker runtime (Python 3.11). The local dev venv is 3.13 but the
# code is written to run on 3.11.
target-version = "py311"
line-length = 100

# pageindex_src/ is a verbatim clone of PageIndex OSS — never linted or edited.
# migrations/ are generated; keep them out of the lint surface too.
extend-exclude = ["pageindex_src", "migrations/versions"]

[lint]
# A pragmatic, non-noisy rule set.
select = ["E", "W", "F", "I", "UP", "B"]
ignore = [
    "E501",  # line length handled by the formatter
    "B008",  # FastAPI uses `Depends(...)` as default args by design
]

[format]
quote-style = "double"
