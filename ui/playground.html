<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground · pageserve</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/assets/styles.css">
  <script src="/ui/assets/core.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 flex">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col h-screen overflow-hidden">
    <header id="topbar"></header>
    <main class="flex-1 flex flex-col overflow-hidden" x-data="page()" x-init="boot()" x-cloak>

      <!-- Toolbar -->
      <div class="flex items-center gap-3 px-6 py-3 border-b border-zinc-200 dark:border-zinc-800 bg-white/60 dark:bg-zinc-900/60 backdrop-blur">
        <select x-model="projectId" @change="onProject()" class="ps-select w-auto">
          <option value="">Select a project…</option>
          <template x-for="p in projects" :key="p.id"><option :value="p.id" x-text="p.name"></option></template>
        </select>
        <div class="flex rounded-xl border border-zinc-300 dark:border-zinc-700 overflow-hidden text-sm p-0.5 bg-zinc-100 dark:bg-zinc-800/60">
          <button @click="setMode('answer')" :class="mode==='answer'?'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-white shadow-sm':'text-zinc-500'" class="px-3.5 py-1.5 rounded-lg transition-all">Answer</button>
          <button @click="setMode('search')" :class="mode==='search'?'bg-white dark:bg-zinc-700 text-zinc-900 dark:text-white shadow-sm':'text-zinc-500'" class="px-3.5 py-1.5 rounded-lg transition-all">Search</button>
        </div>
        <span class="text-xs text-zinc-400 ml-auto font-mono" x-show="result?.elapsed_ms" x-text="(result?.elapsed_ms||0)+' ms'"></span>
      </div>

      <div class="flex-1 flex overflow-hidden">
        <!-- Left -->
        <div class="w-80 shrink-0 border-r border-zinc-200 dark:border-zinc-800 bg-white/60 dark:bg-zinc-900/60 flex flex-col">
          <div class="p-4 border-b border-zinc-200 dark:border-zinc-800">
            <div class="text-xs font-medium text-zinc-500 uppercase tracking-wide mb-2">Documents</div>
            <div class="space-y-1.5 text-sm">
              <label class="flex items-center gap-2 cursor-pointer"><input type="radio" value="all" x-model="docMode" class="accent-brand-600"> All indexed documents</label>
              <label class="flex items-center gap-2 cursor-pointer"><input type="radio" value="select" x-model="docMode" class="accent-brand-600"> Choose specific</label>
            </div>
            <div x-show="docMode==='select'" class="mt-2 space-y-1 max-h-44 overflow-y-auto pr-1">
              <template x-for="d in docs" :key="d.doc_id">
                <label class="flex items-center gap-2 text-sm py-0.5 cursor-pointer" :class="d.status!=='completed'?'opacity-40':''">
                  <input type="checkbox" :value="d.doc_id" x-model="selectedDocIds" :disabled="d.status!=='completed'" class="accent-brand-600">
                  <span class="truncate" x-text="d.name"></span>
                </label>
              </template>
              <div x-show="docs.length===0" class="text-xs text-zinc-400">No documents</div>
            </div>
          </div>
          <div class="p-4 border-b border-zinc-200 dark:border-zinc-800">
            <div class="text-xs font-medium text-zinc-500 uppercase tracking-wide mb-2">Question</div>
            <textarea x-model="question" @input="persist()" @keydown.ctrl.enter="run()"
                      rows="4" class="ps-input resize-none w-full"
                      placeholder="Ask a question… (Ctrl+Enter to run)"></textarea>
            <button @click="run()" :disabled="loading || !projectId || !question.trim()" class="ps-btn ps-btn-primary mt-3 w-full py-2.5">
              <span x-show="loading" class="ps-spin" x-html="PS.icon('refresh','w-4 h-4')"></span>
              <span x-text="loading ? 'Running…' : 'Run query'"></span>
            </button>
          </div>

          <!-- History -->
          <div class="flex-1 flex flex-col min-h-0">
            <div class="px-4 pt-3 pb-2 flex items-center justify-between">
              <span class="text-xs font-medium text-zinc-500 uppercase tracking-wide">History</span>
              <button @click="starredOnly=!starredOnly; loadHistory()" class="text-xs" :class="starredOnly?'text-amber-500':'text-zinc-400 hover:text-zinc-600'" title="Starred only">★</button>
            </div>
            <div class="flex-1 overflow-y-auto px-2 pb-3 space-y-0.5">
              <template x-for="h in history" :key="h.id">
                <div class="group/h flex items-start gap-1.5 px-2 py-1.5 rounded-lg hover:bg-zinc-100 dark:hover:bg-zinc-800/60 cursor-pointer" @click="openHistory(h)">
                  <button @click.stop="toggleStar(h)" class="shrink-0 mt-0.5 text-sm leading-none" :class="h.starred?'text-amber-400':'text-zinc-300 dark:text-zinc-600 hover:text-amber-400'">★</button>
                  <div class="min-w-0 flex-1">
                    <div class="text-sm truncate" x-text="h.question"></div>
                    <div class="text-[11px] text-zinc-400 flex items-center gap-1.5">
                      <span x-text="h.mode"></span><span>·</span><span x-text="PS.fmtRelative(h.created_at)"></span>
                    </div>
                  </div>
                  <button @click.stop="delHistory(h)" class="shrink-0 opacity-0 group-hover/h:opacity-100 text-zinc-400 hover:text-red-500" x-html="PS.icon('trash','w-3.5 h-3.5')"></button>
                </div>
              </template>
              <div x-show="history.length===0" class="px-2 py-6 text-center text-xs text-zinc-400" x-text="projectId ? 'No history yet' : 'Select a project'"></div>
            </div>
          </div>
        </div>

        <!-- Right -->
        <div class="flex-1 overflow-auto p-6">
          <div x-show="!result && !loading" class="h-full flex items-center justify-center">
            <div class="text-center text-zinc-400">
              <div class="w-14 h-14 mx-auto mb-3 rounded-2xl bg-gradient-to-br from-brand-100 to-brand-200 dark:from-brand-500/20 dark:to-brand-600/10 text-brand-600 dark:text-brand-300 flex items-center justify-center" x-html="PS.icon('playground','w-7 h-7')"></div>
              <p class="text-sm">Select a project and documents, then ask a question</p>
            </div>
          </div>

          <!-- Tool steps + stream -->
          <div x-show="loading || steps.length" class="space-y-2 mb-4">
            <template x-for="s in steps" :key="s.id">
              <div class="flex items-center gap-3 px-3 py-2.5 ps-card rounded-xl text-sm" :class="s.status==='done'?'opacity-60':''">
                <span class="text-zinc-400" x-text="s.name==='get_document_structure'?'🗂':(s.name==='get_page_content'?'📖':'⚙️')"></span>
                <span class="flex-1" x-text="label(s.name)"></span>
                <span x-show="s.status==='running'" class="ps-spin text-brand-500" x-html="PS.icon('refresh','w-3.5 h-3.5')"></span>
                <span x-show="s.status==='done'" class="text-xs text-zinc-400 font-mono" x-text="(s.elapsed||0)+'s'"></span>
              </div>
            </template>
          </div>

          <!-- Answer -->
          <div x-show="mode==='answer' && (stream || result)" class="space-y-4">
            <div class="ps-card rounded-2xl p-5">
              <div class="flex items-center gap-2 mb-3"><span class="text-xs font-medium text-zinc-500 uppercase tracking-wide">Answer</span><span x-show="result?.cached" class="ps-badge bg-emerald-100 text-emerald-700 dark:bg-emerald-500/15 dark:text-emerald-400">✓ cached</span></div>
              <div class="ps-prose" x-html="PS.renderCitations(stream || result?.answer)"></div>
              <span x-show="loading" class="ps-cursor"></span>
            </div>
            <template x-for="src in (result?.sources||[])" :key="src.doc_id">
              <div class="space-y-2">
                <template x-for="rp in src.raw_pages" :key="rp.page">
                  <details class="ps-card rounded-xl group">
                    <summary class="px-4 py-2.5 cursor-pointer text-sm flex items-center gap-2 select-none">
                      <span class="text-zinc-400 group-open:rotate-90 transition-transform" x-html="PS.icon('chevron','w-4 h-4')"></span>
                      <span>📄 <span x-text="docName(src.doc_id)"></span> — page <span x-text="rp.page"></span></span>
                    </summary>
                    <pre class="px-4 pb-4 text-xs whitespace-pre-wrap font-sans text-zinc-600 dark:text-zinc-400 border-t border-zinc-100 dark:border-zinc-800 pt-3" x-text="rp.content"></pre>
                  </details>
                </template>
              </div>
            </template>
          </div>

          <!-- Search -->
          <div x-show="mode==='search' && result?.results" class="space-y-4">
            <template x-for="r in (result?.results||[])" :key="r.doc_id">
              <div class="ps-card rounded-2xl overflow-hidden">
                <div class="px-4 py-2.5 border-b border-zinc-200 dark:border-zinc-800 text-sm font-medium">📄 <span x-text="docName(r.doc_id)"></span></div>
                <template x-for="(s, si) in r.sections" :key="si">
                  <div class="px-4 py-3 border-t border-zinc-100 dark:border-zinc-800 first:border-t-0">
                    <div class="flex items-center justify-between mb-2">
                      <span class="text-sm font-medium" x-text="s.title || 'Section'"></span>
                      <span class="text-xs text-zinc-400 font-mono" x-text="(s.page_end && s.page_end > s.page_start) ? ('p.'+s.page_start+'–'+s.page_end) : ('p.'+s.page_start)"></span>
                    </div>
                    <template x-for="pg in (s.pages||[])" :key="pg.page">
                      <div class="mb-2">
                        <div class="text-[11px] uppercase tracking-wide text-zinc-400 mb-0.5">trang <span x-text="pg.page"></span></div>
                        <pre class="text-sm text-zinc-600 dark:text-zinc-300 whitespace-pre-wrap font-sans leading-relaxed" x-text="pg.content"></pre>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>

    </main>
  </div>

<script>
function page() {
  return {
    projects: [], projectId: "", docs: [], docMode: "all", selectedDocIds: [],
    mode: "answer", question: "", loading: false, steps: [], stream: "", result: null,
    history: [], starredOnly: false,
    async boot() {
      await PS.boot("playground", "Playground", "Query your documents directly");
      try { this.projects = await PS.api("GET", "/admin/projects"); } catch (e) { PS.toast(e.message, "error"); }
      this.projectId = PS.qs().get("project") || "";
      this.mode = PS.qs().get("mode") || "answer";
      if (this.projectId) { this.question = sessionStorage.getItem("ps-q-" + this.projectId) || ""; await this.loadDocs(); await this.loadHistory(); }
    },
    async loadHistory() {
      if (!this.projectId) { this.history = []; return; }
      try {
        const q = `project_id=${this.projectId}&limit=30` + (this.starredOnly ? "&starred=true" : "");
        this.history = await PS.api("GET", `/admin/playground/history?${q}`);
      } catch (e) { /* ignore */ }
    },
    async openHistory(h) {
      try {
        const d = await PS.api("GET", `/admin/playground/history/${h.id}`);
        this.question = d.question; this.persist();
        this.setMode(d.mode); this.steps = []; this.stream = "";
        const r = d.response || {};
        this.result = d.mode === "search" ? { results: r.results || [] }
          : { answer: r.answer || "", sources: r.sources || [], elapsed_ms: r.elapsed_ms, cached: false };
      } catch (e) { PS.toast(e.message, "error"); }
    },
    async toggleStar(h) {
      try { const r = await PS.api("POST", `/admin/playground/history/${h.id}/star`); h.starred = r.starred; }
      catch (e) { PS.toast(e.message, "error"); }
    },
    async delHistory(h) {
      try { await PS.api("DELETE", `/admin/playground/history/${h.id}`); this.history = this.history.filter((x) => x.id !== h.id); }
      catch (e) { PS.toast(e.message, "error"); }
    },
    docName(id) { return (this.docs.find((d) => d.doc_id === id)?.name) || id.slice(0, 8); },
    label(name) { return { get_document_structure: "Reading document structure", get_page_content: "Reading page content" }[name] || name; },
    persist() { if (this.projectId) sessionStorage.setItem("ps-q-" + this.projectId, this.question); },
    setMode(m) { this.mode = m; PS.setQuery({ mode: m }); },
    async onProject() {
      PS.setQuery({ project: this.projectId || null });
      this.selectedDocIds = []; this.result = null; this.steps = []; this.stream = "";
      this.question = this.projectId ? (sessionStorage.getItem("ps-q-" + this.projectId) || "") : "";
      await this.loadDocs();
      await this.loadHistory();
    },
    async loadDocs() {
      this.docs = [];
      if (!this.projectId) return;
      try { const r = await PS.api("GET", `/admin/projects/${this.projectId}/documents`); this.docs = r.documents; }
      catch (e) { PS.toast(e.message, "error"); }
    },
    async run() {
      if (!this.projectId || !this.question.trim()) return;
      this.loading = true; this.result = null; this.steps = []; this.stream = "";
      const docIds = this.docMode === "all" ? this.docs.filter((d) => d.status === "completed").map((d) => d.doc_id) : this.selectedDocIds;
      const stepMap = {};
      try {
        const res = await fetch("/admin/playground/query/stream", {
          method: "POST", headers: { "Content-Type": "application/json", Authorization: `Bearer ${PS.token}` },
          body: JSON.stringify({ project_id: this.projectId, doc_ids: docIds, question: this.question, mode: this.mode }),
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).detail || "Query failed");
        const reader = res.body.getReader(); const dec = new TextDecoder(); let buf = "";
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split("\n"); buf = lines.pop();
          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const ev = JSON.parse(line.slice(6));
            if (ev.type === "tool_start") { const s = { id: ev.id, name: ev.name, status: "running" }; stepMap[ev.id] = s; this.steps = [...this.steps, s]; }
            else if (ev.type === "tool_done") { const s = stepMap[ev.id]; if (s) { s.status = "done"; s.elapsed = ev.elapsed; this.steps = [...this.steps]; } }
            else if (ev.type === "token") { this.stream += ev.content; }
            else if (ev.type === "sources") { this.result = { answer: this.stream, sources: ev.sources, cached: ev.cached }; }
            else if (ev.type === "done") { if (this.mode === "search") this.result = { results: ev.results || [] }; }
            else if (ev.type === "error") { PS.toast(ev.message, "error"); }
          }
        }
      } catch (e) { PS.toast(e.message, "error"); }
      finally { this.loading = false; setTimeout(() => this.loadHistory(), 1200); }
    },
  };
}
</script>
</body>
</html>
