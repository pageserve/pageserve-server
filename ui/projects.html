<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="/ui/assets/logo.png" />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects · pageserve</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ui/assets/styles.css">
  <script src="/ui/assets/core.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 flex">
  <aside id="sidebar"></aside>
  <div class="flex-1 flex flex-col h-screen overflow-hidden">
    <header id="topbar"></header>
    <main class="flex-1 overflow-auto p-6 max-w-6xl w-full mx-auto" x-data="page()" x-init="boot()" x-cloak>

      <!-- ───────── Grid view ───────── -->
      <div x-show="!active">
        <!-- Toolbar -->
        <div class="flex items-center gap-3 mb-6">
          <div class="relative flex-1 max-w-xs">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400" x-html="PS.icon('search','w-4 h-4')"></span>
            <input x-model="search" placeholder="Search projects…" class="ps-input pl-9">
          </div>
          <span class="text-sm text-zinc-400 hidden sm:block" x-text="projects.length + (projects.length===1?' project':' projects')"></span>
          <button x-show="isAdmin" @click="openCreate()" class="ps-btn ps-btn-primary ml-auto" x-html="PS.icon('plus','w-4 h-4') + '<span>New project</span>'"></button>
        </div>

        <!-- Skeletons -->
        <div x-show="loading" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
          <template x-for="i in 6" :key="i">
            <div class="ps-card rounded-2xl p-5">
              <div class="flex items-center gap-3"><div class="ps-skel w-11 h-11 !rounded-xl"></div><div class="flex-1 space-y-2"><div class="ps-skel h-3.5 w-2/3"></div><div class="ps-skel h-3 w-1/3"></div></div></div>
              <div class="mt-4 pt-4 border-t border-zinc-100 dark:border-zinc-800 flex gap-4"><div class="ps-skel h-3 w-14"></div><div class="ps-skel h-3 w-14"></div><div class="ps-skel h-3 w-14"></div></div>
            </div>
          </template>
        </div>

        <!-- Cards -->
        <div x-show="!loading" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 ps-stagger">
          <template x-for="p in filtered" :key="p.id">
            <button @click="open(p.id)" class="group text-left ps-card ps-card-hover rounded-2xl p-5 flex flex-col">
              <div class="flex items-start gap-3">
                <div class="w-11 h-11 shrink-0 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-semibold text-lg shadow-[0_4px_14px_-4px_rgb(220_38_38/.5)]" x-text="(p.name||'?')[0].toUpperCase()"></div>
                <div class="min-w-0 flex-1">
                  <div class="font-semibold tracking-tight truncate" x-text="p.name"></div>
                  <div class="text-xs text-zinc-400 font-mono truncate" x-text="p.slug"></div>
                </div>
                <span class="text-zinc-300 dark:text-zinc-600 group-hover:text-brand-500 group-hover:translate-x-0.5 transition-all" x-html="PS.icon('chevron','w-5 h-5')"></span>
              </div>
              <p x-show="p.description" class="text-sm text-zinc-500 mt-3 line-clamp-2" x-text="p.description"></p>
              <div class="mt-4 pt-4 border-t border-zinc-100 dark:border-zinc-800 flex items-center gap-4 text-xs text-zinc-500">
                <span class="inline-flex items-center gap-1.5"><span class="text-zinc-400" x-html="PS.icon('docs','w-4 h-4')"></span><span class="font-medium text-zinc-700 dark:text-zinc-300" x-text="(p.doc_count||0)"></span> docs</span>
                <span class="inline-flex items-center gap-1.5"><span class="text-zinc-400" x-html="PS.icon('keys','w-4 h-4')"></span><span class="font-medium text-zinc-700 dark:text-zinc-300" x-text="(p.key_count||0)"></span> keys</span>
                <span class="inline-flex items-center gap-1.5"><span class="text-zinc-400" x-html="PS.icon('users','w-4 h-4')"></span><span class="font-medium text-zinc-700 dark:text-zinc-300" x-text="(p.member_count||0)"></span> members</span>
              </div>
            </button>
          </template>

          <!-- Empty -->
          <div x-show="projects.length===0" class="col-span-full">
            <div class="ps-card rounded-2xl py-16 flex flex-col items-center text-center">
              <div class="w-14 h-14 rounded-2xl bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 flex items-center justify-center mb-4" x-html="PS.icon('projects','w-7 h-7')"></div>
              <h3 class="font-semibold tracking-tight">No projects yet</h3>
              <p class="text-sm text-zinc-500 mt-1 mb-5 max-w-xs">Create your first project to start uploading documents and querying them.</p>
              <button x-show="isAdmin" @click="openCreate()" class="ps-btn ps-btn-primary" x-html="PS.icon('plus','w-4 h-4') + '<span>New project</span>'"></button>
            </div>
          </div>
          <!-- No search results -->
          <div x-show="projects.length>0 && filtered.length===0" class="col-span-full py-14 text-center text-sm text-zinc-400">No projects match “<span x-text="search"></span>”.</div>
        </div>
      </div>

      <!-- ───────── Detail view ───────── -->
      <div x-show="active" class="space-y-6">
        <nav class="flex items-center gap-1.5 text-sm text-zinc-400">
          <button @click="close()" class="hover:text-zinc-700 dark:hover:text-zinc-200 transition-colors">Projects</button>
          <span x-html="PS.icon('chevron','w-4 h-4')"></span>
          <span class="text-zinc-700 dark:text-zinc-200 font-medium" x-text="active?.name"></span>
        </nav>

        <div class="flex items-start justify-between gap-4">
          <div class="flex items-center gap-3.5 min-w-0">
            <div class="w-12 h-12 shrink-0 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 text-white flex items-center justify-center font-semibold text-xl shadow-[0_4px_14px_-4px_rgb(220_38_38/.5)]" x-text="(active?.name||'?')[0].toUpperCase()"></div>
            <div class="min-w-0">
              <h2 class="text-xl font-semibold tracking-tight truncate" x-text="active?.name"></h2>
              <span class="text-xs text-zinc-400 font-mono" x-text="active?.slug"></span>
            </div>
          </div>
          <label class="ps-btn ps-btn-primary cursor-pointer shrink-0">
            <span x-html="PS.icon('upload','w-4 h-4')"></span><span>Upload PDF</span>
            <input type="file" accept="application/pdf" class="hidden" @change="upload($event)">
          </label>
        </div>

        <!-- Summary stats -->
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 ps-stagger">
          <div class="ps-stat"><span class="text-xs text-zinc-500">Total documents</span><span class="text-xl font-semibold tracking-tight" x-text="docs.length"></span></div>
          <div class="ps-stat"><span class="text-xs text-zinc-500">Completed</span><span class="text-xl font-semibold tracking-tight text-emerald-600 dark:text-emerald-400" x-text="docStats.completed"></span></div>
          <div class="ps-stat"><span class="text-xs text-zinc-500">Indexing</span><span class="text-xl font-semibold tracking-tight text-blue-600 dark:text-blue-400" x-text="docStats.indexing"></span></div>
          <div class="ps-stat"><span class="text-xs text-zinc-500">Total pages</span><span class="text-xl font-semibold tracking-tight" x-text="docStats.pages"></span></div>
        </div>

        <!-- Documents table -->
        <div class="ps-card rounded-2xl overflow-hidden">
          <div class="px-4 py-3 border-b border-zinc-200 dark:border-zinc-800 flex items-center justify-between">
            <h3 class="text-sm font-semibold">Documents</h3>
            <button @click="loadDocs()" class="ps-icon-btn !w-8 !h-8" title="Refresh" x-html="PS.icon('refresh','w-4 h-4')"></button>
          </div>
          <table class="w-full text-sm">
            <thead class="text-xs uppercase text-zinc-400 border-b border-zinc-200 dark:border-zinc-800">
              <tr><th class="text-left font-medium px-4 py-2.5">Name</th><th class="text-left font-medium px-4 py-2.5">Status</th><th class="text-left font-medium px-4 py-2.5">Pages</th><th class="text-left font-medium px-4 py-2.5">Uploaded</th><th class="px-4 py-2.5"></th></tr>
            </thead>
            <tbody class="divide-y divide-zinc-100 dark:divide-zinc-800">
              <template x-for="d in docs" :key="d.doc_id">
                <tr class="ps-row group hover:bg-zinc-50 dark:hover:bg-zinc-800/40">
                  <td class="px-4 py-3">
                    <a :href="'/ui/document.html?doc='+d.doc_id+'&project='+active.id" class="flex items-center gap-2.5 min-w-0 text-brand-600 dark:text-brand-400 hover:underline">
                      <span class="shrink-0" x-html="PS.icon('docs','w-4 h-4')"></span>
                      <span class="font-medium truncate max-w-xs" x-text="d.name"></span>
                    </a>
                  </td>
                  <td class="px-4 py-3">
                    <span class="ps-badge" :class="PS.statusBadge(d.status)"><span class="w-1.5 h-1.5 rounded-full" :class="dotClass(d.status)" :style="d.status==='indexing'?'animation:ps-blink 1s steps(2) infinite':''"></span><span x-text="d.status"></span></span>
                    <span x-show="d._progress!=null && !['completed','failed'].includes(d.status)" class="ml-2 text-xs text-zinc-400 font-mono" x-text="(d._progress||0)+'%'"></span>
                  </td>
                  <td class="px-4 py-3 text-zinc-500" x-text="(d.page_count||0)"></td>
                  <td class="px-4 py-3 text-zinc-500 text-xs whitespace-nowrap" x-text="d.created_at?PS.fmtRelative(d.created_at):'—'"></td>
                  <td class="px-4 py-3 text-right whitespace-nowrap">
                    <a :href="'/ui/document.html?doc='+d.doc_id+'&project='+active.id" class="ps-btn ps-btn-ghost !py-1.5 !px-3 text-xs" title="Open document">Open →</a>
                    <span class="inline-flex opacity-0 group-hover:opacity-100 transition-opacity ml-1 align-middle">
                      <button @click="reindex(d)" class="ps-icon-btn !w-8 !h-8 hover:!text-brand-600" title="Reindex" x-html="PS.icon('refresh','w-4 h-4')"></button>
                      <button @click="remove(d)" class="ps-icon-btn !w-8 !h-8 hover:!text-red-500" title="Delete" x-html="PS.icon('trash','w-4 h-4')"></button>
                    </span>
                  </td>
                </tr>
              </template>
              <tr x-show="docs.length===0">
                <td colspan="5" class="px-4 py-14">
                  <div class="flex flex-col items-center text-center text-zinc-400">
                    <div class="w-12 h-12 rounded-2xl bg-zinc-100 dark:bg-zinc-800 flex items-center justify-center mb-3" x-html="PS.icon('upload','w-6 h-6')"></div>
                    <p class="text-sm">No documents yet — upload a PDF to get started.</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Create modal -->
      <div x-show="showCreate" x-transition.opacity class="ps-modal-backdrop fixed inset-0 bg-black/40 dark:bg-black/60 flex items-center justify-center z-50 p-4" @click.self="showCreate=false">
        <div class="ps-modal-panel ps-card rounded-2xl p-6 w-full max-w-md shadow-xl">
          <h3 class="font-semibold tracking-tight mb-4">New project</h3>
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-medium text-zinc-500 mb-1.5">Name</label>
              <input x-model="form.name" @input="autoSlug()" placeholder="My Project" class="ps-input">
            </div>
            <div>
              <label class="block text-xs font-medium text-zinc-500 mb-1.5">Slug</label>
              <input x-model="form.slug" @input="form.slugTouched=true" placeholder="my-project" class="ps-input font-mono">
            </div>
            <div>
              <label class="block text-xs font-medium text-zinc-500 mb-1.5">Description <span class="text-zinc-400 font-normal">(optional)</span></label>
              <textarea x-model="form.description" placeholder="What is this project about?" rows="2" class="ps-input resize-none"></textarea>
            </div>
          </div>
          <div class="flex gap-2 justify-end mt-5">
            <button @click="showCreate=false" class="ps-btn ps-btn-ghost">Cancel</button>
            <button @click="create()" :disabled="!form.name.trim()||!form.slug.trim()" class="ps-btn ps-btn-primary">Create project</button>
          </div>
        </div>
      </div>

    </main>
  </div>

<script>
function page() {
  return {
    isAdmin: false, loading: true, projects: [], search: "", active: null, docs: [], _watchers: {},
    showCreate: false, form: { name: "", slug: "", description: "" },
    get filtered() {
      const q = this.search.trim().toLowerCase();
      if (!q) return this.projects;
      return this.projects.filter((p) => (p.name || "").toLowerCase().includes(q) || (p.slug || "").toLowerCase().includes(q));
    },
    get docStats() {
      const s = { completed: 0, indexing: 0, pending: 0, failed: 0, pages: 0 };
      for (const d of this.docs) { if (d.status in s) s[d.status]++; s.pages += d.page_count || 0; }
      return s;
    },
    dotClass(status) {
      return { completed: "bg-emerald-500", indexing: "bg-blue-500", pending: "bg-amber-500", failed: "bg-red-500" }[status] || "bg-zinc-400";
    },
    async boot() {
      const u = await PS.boot("projects", "Projects", "Manage projects & documents");
      this.isAdmin = u.role === "admin";
      await this.load();
      const pid = PS.qs().get("project");
      if (pid) await this.open(pid, false);
    },
    async load() {
      this.loading = true;
      try { this.projects = await PS.api("GET", "/admin/projects"); }
      catch (e) { PS.toast(e.message, "error"); }
      finally { this.loading = false; }
    },
    openCreate() { this.form = { name: "", slug: "", description: "", slugTouched: false }; this.showCreate = true; },
    autoSlug() {
      // Keep slug in sync with the name until the user edits the slug by hand.
      if (this.form.slugTouched) return;
      this.form.slug = this.form.name.toLowerCase().trim().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
    },
    async open(id, push = true) {
      this.active = this.projects.find((p) => p.id === id) || { id, name: "Project", slug: "" };
      PS.setQuery({ project: id });
      await this.loadDocs();
    },
    close() { this._stopWatchers(); this.active = null; this.docs = []; PS.setQuery({ project: null }); this.load(); },
    async loadDocs() {
      try { const r = await PS.api("GET", `/admin/projects/${this.active.id}/documents`); this.docs = r.documents; this._watchAll(); }
      catch (e) { PS.toast(e.message, "error"); }
    },
    // Live progress over SSE — one stream per still-indexing doc (no polling).
    _watchAll() {
      for (const d of this.docs) {
        if (!["completed", "failed"].includes(d.status) && !this._watchers[d.doc_id]) this._watchDoc(d.doc_id);
      }
    },
    _watchDoc(docId) {
      const ac = new AbortController();
      this._watchers[docId] = ac;
      PS.streamSSE("GET", `/admin/documents/${docId}/progress`, null, (ev) => {
        const cur = this.docs.find((x) => x.doc_id === docId);
        if (cur) { if (typeof ev.progress === "number") cur._progress = ev.progress; if (ev.status) cur.status = ev.status; }
        if (ev.status === "completed" || ev.status === "failed") { ac.abort(); delete this._watchers[docId]; this.loadDocs(); }
      }, { signal: ac.signal }).catch(() => { delete this._watchers[docId]; });
    },
    _stopWatchers() { Object.values(this._watchers).forEach((ac) => ac.abort()); this._watchers = {}; },
    async upload(ev) {
      const file = ev.target.files[0]; if (!file) return;
      const fd = new FormData(); fd.append("file", file);
      try { await PS.api("POST", `/admin/projects/${this.active.id}/documents`, fd); PS.toast("Uploaded — indexing…", "success"); this.loadDocs(); }
      catch (e) { PS.toast(e.message, "error"); }
      ev.target.value = "";
    },
    async reindex(d) { try { await PS.api("POST", `/admin/documents/${d.doc_id}/reindex`); PS.toast("Reindex started", "success"); this.loadDocs(); } catch (e) { PS.toast(e.message, "error"); } },
    async remove(d) {
      if (!await PS.confirm({ title: "Delete document", message: `“${d.name}” and its index will be permanently removed. This can't be undone.`, confirmText: "Delete", danger: true })) return;
      try { await PS.api("DELETE", `/admin/documents/${d.doc_id}`); PS.toast("Document deleted", "success"); this.loadDocs(); } catch (e) { PS.toast(e.message, "error"); }
    },
    async create() {
      if (!this.form.name.trim() || !this.form.slug.trim()) return;
      try { const p = await PS.api("POST", "/admin/projects", { name: this.form.name, slug: this.form.slug, description: this.form.description }); this.showCreate = false; await this.load(); PS.toast("Project created", "success"); this.open(p.id); }
      catch (e) { PS.toast(e.message, "error"); }
    },
  };
}
</script>
</body>
</html>
